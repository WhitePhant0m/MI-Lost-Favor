[milestones]
	#Number of hearts you start out with.
	# Default: 10
	# Range: 0 ~ 1000
	baseHearts = 10
	#Number of hearts you gain for reaching a new milestone.
	# Default: 2
	# Range: 0 ~ 1000
	heartsPerMilestone = 1
	#A list of numbers of unique foods you need to eat to unlock each milestone, in ascending order. Naturally, adding more milestones lets you earn more hearts.
	milestones = [2, 4, 6, 8, 10, 12, 14, 16]

[filtering]
	#Foods in this list won't affect the player's health nor show up in the food book.
	blacklist = []
	#When this list contains anything, the blacklist is ignored and instead only foods from here count.
	whitelist = ['minecraft:enchanted_golden_apple', 'minecraft:golden_carrot', 'refurbished_furniture:meatlovers_pizza_slice', 'refurbished_furniture:vegetable_pizza_slice', 'refurbished_furniture:glow_berry_jam_toast', 'refurbished_furniture:sweet_berry_jam_toast', 'refurbished_furniture:cheese_toastie', 'refurbished_furniture:cheese_sandwich', 'occultism:sweet_honey_heart', 'occultism:beaver_nugget', 'spectrum:rabbit_cream_pie', 'spectrum:peach_cream', 'spectrum:peaches_flambe', 'spectrum:mellow_shallot_soup', 'spectrum:meatloaf_sandwich', 'spectrum:junket', 'spectrum:hare_roast', 'spectrum:golden_bristle_tea', 'spectrum:cooked_lizard_meat', 'spectrum:fishcake', 'spectrum:faded_koi', 'spectrum:cream_pastry', 'spectrum:crawfish_cocktail', 'spectrum:chauve_souris_au_vin', 'spectrum:berliner', 'spectrum:banyash', 'spectrum:bagnun', 'spectrum:dragonbone_broth', 'spectrum:triple_meat_pot_stew', 'spectrum:myceylon_pumpkin_pie', 'spectrum:myceylon_apple_pie', 'spectrum:demon_trifle', 'spectrum:monster_trifle', 'spectrum:salted_jaramel_trifle', 'spectrum:jaramel_trifle', 'spectrum:puff_tart', 'spectrum:whispy_tart', 'spectrum:weeping_tart', 'spectrum:ashen_tart', 'spectrum:salted_jaramel_tart', 'spectrum:jaramel_tart', 'spectrum:honey_pastry', 'spectrum:enchanted_star_candy', 'spectrum:enchanted_golden_carrot', 'spectrum:bodacious_berry_bar', 'spectrum:triple_meat_pot_pie', 'minecraft:rabbit_stew', 'minecraft:beetroot_soup', 'minecraft:mushroom_stew', 'minecraft:pumpkin_pie']
	#The minimum hunger value foods need to provide in order to count for milestones, in half drumsticks.
	# Default: 1
	# Range: 0 ~ 1000
	minimumFoodValue = 1

[miscellaneous]
	#Whether or not to reset the food list on death, effectively losing all bonus hearts.
	resetOnDeath = false
	#If true, eating foods outside of survival mode (e.g. creative/adventure) is not tracked and thus does not contribute towards progression.
	limitProgressionToSurvival = true
